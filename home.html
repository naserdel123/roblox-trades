<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريدات روبلوكس - الرئيسية</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="home-page">
    <!-- خلفية متحركة -->
    <div class="bg-animation">
        <div class="bg-gradient"></div>
        <div class="floating-shapes" id="shapes"></div>
    </div>

    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo-small">
                <span>R$</span>
            </div>
            <span class="brand-text">تريدات روبلوكس</span>
        </div>
        <div class="nav-user">
            <span id="currentUser">مرحباً، زائر</span>
            <button class="btn-logout" onclick="logout()">خروج</button>
        </div>
    </nav>

    <!-- المحتوى الرئيسي -->
    <main class="main-content">
        <div class="trades-grid" id="tradesGrid">
            <!-- سيتم إضافة التريدات هنا ديناميكياً -->
        </div>
    </main>

    <!-- زر الإضافة العائم -->
    <button class="fab" id="fabBtn" onclick="openModal()">
        <span class="fab-icon">+</span>
        <div class="fab-ripple"></div>
        <div class="fab-tooltip">إضافة تريد</div>
    </button>

    <!-- نافذة إضافة تريد -->
    <div class="modal-overlay" id="addTradeModal">
        <div class="modal-content glass-effect">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2 class="modal-title">✨ نشر تريد جديد</h2>
            
            <form id="tradeForm" class="trade-form">
                <div class="form-section">
                    <h3>العنصر المعروض</h3>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="itemImage" accept="image/*" hidden>
                        <div class="upload-content">
                            <div class="upload-icon">📦</div>
                            <p>اضغط أو اسحب الصورة هنا</p>
                            <span class="upload-hint">JPG, PNG حتى 5MB</span>
                        </div>
                        <img id="previewImage" class="preview-image">
                        <div class="upload-overlay"></div>
                    </div>
                    
                    <div class="input-group floating">
                        <input type="text" id="itemName" required placeholder="اسم العنصر">
                        <label>اسم العنصر في روبلوكس</label>
                    </div>
                </div>

                <div class="form-section">
                    <h3>المقابل المطلوب</h3>
                    <div class="upload-area small" id="tradeUploadArea">
                        <input type="file" id="tradeImage" accept="image/*" hidden>
                        <div class="upload-content">
                            <div class="upload-icon">🎯</div>
                            <p>صورة المقابل</p>
                        </div>
                        <img id="previewTradeImage" class="preview-image">
                    </div>
                    
                    <div class="input-group floating">
                        <input type="text" id="tradeItemName" required placeholder="اسم المقابل">
                        <label>ما الذي تريده مقابلاً؟</label>
                    </div>
                </div>

                <div class="form-section">
                    <h3>تواصل</h3>
                    <div class="input-group floating tiktok-group">
                        <input type="url" id="tiktokLink" required placeholder="رابط TikTok">
                        <label>رابط حساب TikTok</label>
                        <span class="input-icon">🎵</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-glow">
                    <span class="btn-text">نشر التريد</span>
                    <span class="btn-icon">🚀</span>
                    <div class="btn-effect"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- نموذج بطاقة التريد (Template) -->
    <template id="tradeCardTemplate">
        <div class="trade-card">
            <div class="card-shine"></div>
            <div class="card-content">
                <div class="item-section">
                    <div class="item-image-container">
                        <img class="item-image" src="" alt="العنصر">
                        <div class="image-glow"></div>
                    </div>
                    <h3 class="item-name"></h3>
                </div>
                
                <div class="trade-arrow">
                    <span>⇄</span>
                    <div class="arrow-pulse"></div>
                </div>
                
                <div class="wanted-section">
                    <div class="wanted-image-container">
                        <img class="wanted-image" src="" alt="المقابل">
                    </div>
                    <h4 class="wanted-name"></h4>
                </div>
            </div>
            
            <div class="card-footer">
                <a class="tiktok-btn" target="_blank">
                    <span class="tiktok-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
                        </svg>
                    </span>
                    <span>تواصل عبر TikTok</span>
                </a>
                <span class="trade-time"></span>
            </div>
        </div>
    </template>

    <script src="js/app.js"></script>
</body>
</html>
