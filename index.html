<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريدات روبلوكس</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- خلفية -->
    <div class="particles" id="particles"></div>
    <div class="touch-effects" id="touchEffects"></div>

    <div class="login-container">
        <!-- الشعار -->
        <div class="logo-3d">
            <div class="roblox-logo">
                <div class="logo-cube">
                    <div class="face front">R$</div>
                    <div class="face back">R$</div>
                    <div class="face right">R$</div>
                    <div class="face left">R$</div>
                    <div class="face top">R$</div>
                    <div class="face bottom">R$</div>
                </div>
                <div class="logo-glow"></div>
            </div>
            <h1 class="site-title">تريدات روبلوكس</h1>
        </div>

        <!-- صندوق النماذج -->
        <div class="forms-wrapper">
            
            <!-- تسجيل الدخول - يظهر أولاً -->
            <div class="form-box active" id="loginBox">
                <div class="form-header">
                    <div class="form-icon">🔐</div>
                    <h2>تسجيل الدخول</h2>
                    <p>أهلاً بعودتك، تاجر!</p>
                </div>
                
                <form id="loginForm">
                    <div class="input-group floating">
                        <input type="text" id="loginUsername" required placeholder=" ">
                        <label>اسم المستخدم</label>
                        <span class="input-line"></span>
                        <span class="input-icon">👤</span>
                    </div>
                    
                    <div class="input-group floating">
                        <input type="password" id="loginPassword" required placeholder=" ">
                        <label>كلمة المرور</label>
                        <span class="input-line"></span>
                        <span class="input-icon">🔒</span>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">👁️</button>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            تذكرني
                        </label>
                        <a href="#" class="forgot-link" onclick="showForm('recovery')">نسيت كلمة المرور؟</a>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <span class="btn-text">دخول</span>
                        <span class="btn-shine"></span>
                    </button>
                </form>
                
                <div class="switch-form">
                    <p>ليس لديك حساب؟ <a href="#" onclick="showForm('register')">سجل الآن</a></p>
                </div>
            </div>

            <!-- إنشاء حساب - مخفي -->
            <div class="form-box hidden" id="registerBox">
                <div class="form-header">
                    <div class="form-icon">🎮</div>
                    <h2>إنشاء حساب</h2>
                    <p>انضم لعالم التداول!</p>
                </div>
                
                <form id="registerForm">
                    <div class="input-group floating">
                        <input type="text" id="regUsername" required placeholder=" " minlength="3" maxlength="20">
                        <label>اسم المستخدم</label>
                        <span class="input-line"></span>
                        <span class="input-icon">👤</span>
                    </div>
                    
                    <div class="input-group floating">
                        <input type="email" id="regEmail" required placeholder=" ">
                        <label>البريد الإلكتروني</label>
                        <span class="input-line"></span>
                        <span class="input-icon">📧</span>
                    </div>
                    
                    <div class="input-group floating">
                        <input type="password" id="regPassword" required placeholder=" " minlength="6">
                        <label>كلمة المرور</label>
                        <span class="input-line"></span>
                        <span class="input-icon">🔒</span>
                        <button type="button" class="toggle-password" onclick="togglePassword('regPassword')">👁️</button>
                    </div>

                    <div class="input-group floating">
                        <input type="password" id="regConfirmPassword" required placeholder=" ">
                        <label>تأكيد كلمة المرور</label>
                        <span class="input-line"></span>
                        <span class="input-icon">🔐</span>
                    </div>

                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"></div>
                        <span class="strength-text">قوة كلمة المرور</span>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-glow">
                        <span class="btn-text">إنشاء حساب</span>
                        <span class="btn-shine"></span>
                    </button>
                </form>
                
                <div class="switch-form">
                    <p>لديك حساب؟ <a href="#" onclick="showForm('login')">تسجيل الدخول</a></p>
                </div>
            </div>

            <!-- استرجاع الحساب - مخفي -->
            <div class="form-box hidden" id="recoveryBox">
                <div class="form-header">
                    <div class="form-icon">🔑</div>
                    <h2>استرجاع الحساب</h2>
                    <p>سنرسل رابط التعيين لبريدك</p>
                </div>
                
                <form id="recoveryForm">
                    <div class="input-group floating">
                        <input type="email" id="recoveryEmail" required placeholder=" ">
                        <label>البريد الإلكتروني</label>
                        <span class="input-line"></span>
                        <span class="input-icon">📧</span>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <span class="btn-text">إرسال الرابط</span>
                        <span class="btn-shine"></span>
                    </button>
                </form>
                
                <div class="switch-form">
                    <p><a href="#" onclick="showForm('login')">← العودة للتسجيل</a></p>
                </div>
            </div>

        </div>
    </div>

    <div class="notifications" id="notifications"></div>

    <script src="js/app.js"></script>
</body>
                          </html>
