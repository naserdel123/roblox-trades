<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريدات روبلوكس - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="particles" id="particles"></div>
    
    <div class="login-container">
        <div class="logo-3d">
            <div class="roblox-logo">
                <span class="logo-text">R$</span>
                <div class="logo-glow"></div>
            </div>
            <h1 class="site-title">تريدات روبلوكس</h1>
        </div>

        <div class="forms-wrapper">
            <!-- نموذج تسجيل الدخول -->
            <div class="form-box login-box active" id="loginBox">
                <h2>تسجيل الدخول</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="loginUsername" required placeholder=" ">
                        <label>اسم المستخدم</label>
                        <span class="input-border"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" required placeholder=" ">
                        <label>كلمة المرور</label>
                        <span class="input-border"></span>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>دخول</span>
                        <div class="btn-shine"></div>
                    </button>
                </form>
                <p class="switch-form">ليس لديك حساب؟ <a href="#" onclick="toggleForm()">سجل الآن</a></p>
            </div>

            <!-- نموذج إنشاء حساب -->
            <div class="form-box register-box" id="registerBox">
                <h2>إنشاء حساب جديد</h2>
                <form id="registerForm">
                    <div class="input-group">
                        <input type="text" id="regUsername" required placeholder=" ">
                        <label>اسم المستخدم</label>
                        <span class="input-border"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="regPassword" required placeholder=" ">
                        <label>كلمة المرور</label>
                        <span class="input-border"></span>
                    </div>
                    <div class="input-group">
                        <input type="password" id="regConfirmPassword" required placeholder=" ">
                        <label>تأكيد كلمة المرور</label>
                        <span class="input-border"></span>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>إنشاء حساب</span>
                        <div class="btn-shine"></div>
                    </button>
                </form>
                <p class="switch-form">لديك حساب؟ <a href="#" onclick="toggleForm()">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة تريد -->
    <div class="modal-overlay" id="addTradeModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <h2>نشر تريد جديد</h2>
            <form id="tradeForm" class="trade-form">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="itemImage" accept="image/*" hidden>
                    <div class="upload-placeholder">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p>اضغط لرفع صورة العنصر</p>
                    </div>
                    <img id="previewImage" class="preview-image" style="display: none;">
                </div>
                
                <div class="input-group">
                    <input type="text" id="itemName" required placeholder=" ">
                    <label>اسم العنصر</label>
                </div>

                <div class="trade-section">
                    <h3>المقابل المطلوب</h3>
                    <div class="upload-area small" id="tradeUploadArea">
                        <input type="file" id="tradeImage" accept="image/*" hidden>
                        <div class="upload-placeholder">
                            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>صورة المقابل</p>
                        </div>
                        <img id="previewTradeImage" class="preview-image" style="display: none;">
                    </div>
                    <div class="input-group">
                        <input type="text" id="tradeItemName" required placeholder=" ">
                        <label>اسم المقابل</label>
                    </div>
                </div>

                <div class="input-group">
                    <input type="url" id="tiktokLink" required placeholder=" " pattern="https://(www\.)?tiktok\.com/.*">
                    <label>رابط حساب TikTok</label>
                    <span class="tiktok-icon">🎵</span>
                </div>

                <button type="submit" class="btn-primary btn-publish">
                    <span>نشر التريد</span>
                    <div class="btn-particles"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- زر الإضافة العائم -->
    <button class="fab" id="fabBtn" onclick="openModal()">
        <span class="fab-icon">+</span>
        <div class="fab-ripple"></div>
    </button>

    <script src="js/app.js"></script>
</body>
                      </html>
