<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريدات روبلوكس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* شعار متحرك */
        .logo {
            text-align: center;
            margin-bottom: 30px;
            perspective: 1000px;
        }

        .logo-cube {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }

        .logo-cube div {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        @keyframes rotate {
            0% { transform: rotateX(-15deg) rotateY(0deg); }
            100% { transform: rotateX(-15deg) rotateY(360deg); }
        }

        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
            to { text-shadow: 0 0 40px rgba(102, 126, 234, 0.8), 0 0 60px rgba(240, 147, 251, 0.4); }
        }

        /* صندوق النموذج */
        .form-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
            position: relative;
        }

        .form-box h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        /* حقول الإدخال */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* زر */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* تبديل */
        .switch {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
        }

        .switch a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }

        .switch a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #667eea;
            transition: width 0.3s;
        }

        .switch a:hover::after {
            width: 100%;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <!-- الشعار -->
        <div class="logo">
            <div class="logo-cube">
                <div class="front">R$</div>
                <div class="back">R$</div>
                <div class="right">R$</div>
                <div class="left">R$</div>
                <div class="top">R$</div>
                <div class="bottom">R$</div>
            </div>
            <h1>تريدات روبلوكس</h1>
        </div>

        <!-- تسجيل الدخول -->
        <div class="form-box" id="loginBox">
            <h2>تسجيل الدخول</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
                </div>
                <button type="submit" class="btn">دخول</button>
            </form>
            <div class="switch">
                <p>ليس لديك حساب؟ <a onclick="showForm('register')">سجل الآن</a></p>
            </div>
        </div>

        <!-- إنشاء حساب -->
        <div class="form-box hidden" id="registerBox">
            <h2>إنشاء حساب</h2>
            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="اسم المستخدم" required>
                </div>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="كلمة المرور" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirmPassword" placeholder="تأكيد كلمة المرور" required>
                </div>
                <button type="submit" class="btn">إنشاء حساب</button>
            </form>
            <div class="switch">
                <p>لديك حساب؟ <a onclick="showForm('login')">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script>
        // خلفية متحركة
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            document.getElementById('bgAnimation').appendChild(particle);
        }

        // البيانات
        let users = JSON.parse(localStorage.getItem('users')) || [];

        function showForm(form) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('registerBox').classList.add('hidden');
            document.getElementById(form + 'Box').classList.remove('hidden');
        }

        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'home.html';
            } else {
                alert('اسم المستخدم أو كلمة المرور غير صحيحة');
            }
        });

        // إنشاء حساب
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (password !== confirm) {
                alert('كلمات المرور غير متطابقة');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('اسم المستخدم موجود بالفعل');
                return;
            }
            
            users.push({ id: Date.now(), username, email, password });
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('تم إنشاء الحساب بنجاح!');
            showForm('login');
        });
    </script>
</body>
</html>
